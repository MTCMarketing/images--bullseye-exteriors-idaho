name: Process Uploaded Images

on:
  push:
    paths:
      - "originals/**"

permissions:
  contents: write

concurrency:
  group: process-images-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install sharp
        run: |
          npm init -y
          npm install sharp

      - name: Get changed files
        id: changed
        run: |
          FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | tr '\n' ' ')
          echo "FILES=$FILES" >> $GITHUB_OUTPUT

      - name: Skip if no relevant files
        if: steps.changed.outputs.FILES == ''
        run: echo "No changed files. Skipping."

      - name: Convert only changed images
        if: steps.changed.outputs.FILES != ''
        run: |
          node process-images.js ${{ steps.changed.outputs.FILES }}

      - name: Remove orphaned webp files
        if: steps.changed.outputs.FILES != ''
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const originalsDir = path.join(process.cwd(), 'originals');
          const imagesDir = path.join(process.cwd(), 'images');

          if (!fs.existsSync(imagesDir)) {
            fs.mkdirSync(imagesDir, { recursive: true });
          }

          const originalBaseNames = new Set();
          if (fs.existsSync(originalsDir)) {
            const originalFiles = fs.readdirSync(originalsDir);
            for (const file of originalFiles) {
              const ext = path.extname(file);
              const base = path.basename(file, ext);
              originalBaseNames.add(base);
            }
          }

          const imageFiles = fs.readdirSync(imagesDir).filter(f => f.endsWith('.webp'));

          for (const file of imageFiles) {
            const base = path.basename(file, '.webp');
            if (!originalBaseNames.has(base)) {
              const target = path.join(imagesDir, file);
              fs.unlinkSync(target);
              console.log('Removed orphan webp:', file);
            }
          }
          EOF

      - name: Rebuild files.json from current images directory
        if: steps.changed.outputs.FILES != ''
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const repoFull = process.env.GITHUB_REPOSITORY || '';
          const [owner, repo] = repoFull.split('/');
          const ownerLower = (owner || '').toLowerCase();

          const imagesDir = path.join(process.cwd(), 'images');
          const filePath = path.join(imagesDir, 'files.json');

          if (!fs.existsSync(imagesDir)) {
            fs.mkdirSync(imagesDir, { recursive: true });
          }

          const files = fs
            .readdirSync(imagesDir)
            .filter(f => f.endsWith('.webp'))
            .sort((a, b) => a.localeCompare(b));

          const data = {};

          for (const file of files) {
            const base = path.basename(file, '.webp');

            data[base] = {
              path: `https://${ownerLower}.github.io/${repo}/images/${file}`,
              name: file,
              meta: {}
            };
          }

          fs.writeFileSync(filePath, JSON.stringify(data, null, 2));
          console.log('files.json rebuilt from actual images directory');
          EOF

      - name: Commit processed images + metadata
        if: steps.changed.outputs.FILES != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add images

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync processed images + metadata"
            git push
          fi
